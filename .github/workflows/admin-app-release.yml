# Construye y firma el APK release de AIENC Admin y lo sube como asset al
# GitHub Release que dispara el workflow.
#
# Disparadores:
#   - push de un tag con prefijo `admin-app-v` (ej. admin-app-v0.1.0)
#   - manual ("Run workflow") desde la pestaña Actions
#
# Secrets requeridos en el repo (Settings → Secrets and variables → Actions):
#   ADMIN_APP_KEYSTORE_B64   — base64 del archivo .jks. Generar así:
#                              base64 -w0 aienc-admin-release.jks > out.b64
#   ADMIN_APP_KEY_PROPERTIES — el contenido literal de key.properties
#                              (las mismas líneas que usa Gradle local)
#   AIENC_API_BASE_URL       — https://api.aienc.co (o tu URL de Railway)
#   AIENC_MOBILE_ORIGIN      — aiencadmin://app (debe coincidir con la env
#                              del backend MOBILE_APP_ORIGIN)
#
# Salida:
#   - app-release.apk (universal, ~40MB) en el GitHub Release
#   - app-arm64-v8a-release.apk + app-armeabi-v7a-release.apk +
#     app-x86_64-release.apk (split por ABI) para quien quiera el APK
#     más pequeño posible

name: admin-app-release

on:
  push:
    tags:
      - 'admin-app-v*'
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Etiqueta del release (ej. v0.1.0). Sólo se usa cuando se ejecuta manualmente.'
        required: false
        default: 'manual'

permissions:
  contents: write  # necesario para crear/actualizar el release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable

      - name: Restore keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.ADMIN_APP_KEYSTORE_B64 }}
          KEY_PROPERTIES: ${{ secrets.ADMIN_APP_KEY_PROPERTIES }}
        run: |
          set -euo pipefail
          if [ -z "$KEYSTORE_B64" ] || [ -z "$KEY_PROPERTIES" ]; then
            echo "::error::ADMIN_APP_KEYSTORE_B64 y/o ADMIN_APP_KEY_PROPERTIES no están configurados."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > apps/admin_app/android/aienc-admin-release.jks
          printf '%s' "$KEY_PROPERTIES" > apps/admin_app/android/key.properties
          echo "✓ keystore restaurado ($(wc -c < apps/admin_app/android/aienc-admin-release.jks) bytes)"

      - name: Resolve Flutter packages
        working-directory: apps/admin_app
        run: flutter pub get

      - name: Build APK release
        working-directory: apps/admin_app
        env:
          AIENC_API_BASE_URL: ${{ secrets.AIENC_API_BASE_URL }}
          AIENC_MOBILE_ORIGIN: ${{ secrets.AIENC_MOBILE_ORIGIN }}
        run: |
          flutter build apk --release \
            --dart-define=AIENC_API_BASE_URL="$AIENC_API_BASE_URL" \
            --dart-define=AIENC_MOBILE_ORIGIN="$AIENC_MOBILE_ORIGIN" \
            --split-per-abi

      - name: List output APKs
        working-directory: apps/admin_app
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Rename universal APK
        working-directory: apps/admin_app
        run: |
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk \
               build/app/outputs/flutter-apk/aienc-admin.apk
          fi

      - name: Sanity check signing
        working-directory: apps/admin_app
        run: |
          set -e
          APK=build/app/outputs/flutter-apk/aienc-admin.apk
          if [ ! -f "$APK" ]; then
            echo "::error::APK universal no encontrado."
            exit 1
          fi
          # Verificamos que el APK tiene esquema v2 de firma y CN esperado.
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -n 1)/apksigner verify --print-certs "$APK" || true

      - name: Cleanup secrets from disk
        if: always()
        run: |
          rm -f apps/admin_app/android/aienc-admin-release.jks
          rm -f apps/admin_app/android/key.properties

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # En push de tag usa ese tag; en run manual genera un release ad-hoc.
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('admin-app-{0}', github.event.inputs.version_label || github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Admin App {0}', github.event.inputs.version_label || github.run_number) }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            apps/admin_app/build/app/outputs/flutter-apk/aienc-admin.apk
            apps/admin_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            apps/admin_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            apps/admin_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
